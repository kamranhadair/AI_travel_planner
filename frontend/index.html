<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Planner</title>
    <meta name="description" content="Generate a personalised day-by-day travel itinerary powered by AI. Enter your destination, trip length, and budget to get started.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-icon">✈️</div>
        <h1>AI Travel Planner</h1>
        <p>Get a personalised day-by-day itinerary in seconds</p>
    </header>

    <main id="app">
        <form id="plan-form" novalidate>
            <div class="form-group">
                <label for="destination">Destination</label>
                <input
                    id="destination"
                    type="text"
                    placeholder="e.g. Tokyo, Paris, Bali…"
                    autocomplete="off"
                    required
                />
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="days">Duration (days)</label>
                    <input
                        id="days"
                        type="number"
                        min="1"
                        max="30"
                        value="5"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="budget">Budget</label>
                    <select id="budget">
                        <option value="low">🪙 Low</option>
                        <option value="moderate" selected>💳 Moderate</option>
                        <option value="high">💎 High</option>
                    </select>
                </div>
            </div>

            <details class="advanced-options">
                <summary>Advanced Options (+)</summary>
                <div class="advanced-options-content">
                    <div class="form-group">
                        <label for="interests">Interests (Optional)</label>
                        <input id="interests" type="text" placeholder="e.g. food, history, nightlife">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="diet">Dietary Needs</label>
                            <input id="diet" type="text" placeholder="e.g. vegan, halal">
                        </div>
                        <div class="form-group">
                            <label for="pace">Pace</label>
                            <select id="pace">
                                <option value="">Any pace</option>
                                <option value="relaxed">Relaxed</option>
                                <option value="moderate">Moderate</option>
                                <option value="action-packed">Action-packed</option>
                            </select>
                        </div>
                    </div>
                </div>
            </details>

            <button id="submit-btn" type="submit">
                <span id="btn-text">Generate Itinerary</span>
                <span id="btn-loader" class="hidden">Generating…</span>
            </button>
        </form>

        <section id="result" class="hidden" aria-live="polite">
            <div class="result-header">
                <h2 id="result-title"></h2>
                <span id="result-badge"></span>
            </div>
            <div id="itinerary-content"></div>
            
            <!-- Chat interaction phase -->
            <div id="chat-section">
                <div id="chat-history"></div>
                <form id="chat-form">
                    <input type="text" id="chat-input" placeholder="Want to tweak something? (e.g., 'Make it cheaper')" autocomplete="off" required>
                    <button type="submit" id="chat-send">Refine</button>
                </form>
            </div>
        </section>

        <div id="error-msg" class="hidden error-box" role="alert"></div>
    </main>

    <!-- Include marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
